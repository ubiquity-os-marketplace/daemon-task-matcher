name: "Daemon Task Matcher"

on:
  workflow_dispatch:
    inputs:
      stateId:
        description: "State Id"
      eventName:
        description: "Event Name"
      eventPayload:
        description: "Event Payload"
      settings:
        description: "Settings"
      authToken:
        description: "Auth Token"
      ref:
        description: "Ref"
      signature:
        description: "The kernel signature"
      command:
        description: "Command from the Kernel"
        required: false
      ubiquityKernelToken:
        description: "Ubiquity Kernel Token"
        required: false
      kernelPublicKey:
        description: "Kernel public key PEM for signature verification (optional)"
        required: false

jobs:
  compute:
    name: "Daemon Task Matcher"
    runs-on: ubuntu-latest
    permissions: write-all
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && 'main' || 'development' }}
    env:
      PLUGIN_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KERNEL_PUBLIC_KEY: ${{ secrets.KERNEL_PUBLIC_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      UOS_AI_TOKEN: ${{ secrets.UOS_AI_TOKEN }}
      UOS_AI_URL: ${{ vars.UOS_AI_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: execute directive
        run: node ./dist/index.js
